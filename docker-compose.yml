services:
  mongodb:
    image: mongo:7
    container_name: audionix_mongodb
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-change-this-password}
      MONGO_INITDB_DATABASE: Audionix_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - audionix_network

  backend:
    build: ./backend
    container_name: audionix_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MONGODB_URL: mongodb://admin:${MONGO_PASSWORD:-change-this-password}@mongodb:27017/Audionix_db?authSource=admin
      SECRET_KEY: ${SECRET_KEY:-generate-a-strong-secret-key}
      CORS_ORIGINS: https://audionix.djgrego.com
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - audionix_network

  # ... rest of your services
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audionix_frontend
    volumes:
      - frontend_build:/app/dist
    depends_on:
      - backend
    networks:
      - audionix_network

  nginx:
    image: nginx:alpine
    container_name: audionix_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - frontend_build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - audionix_network

volumes:
  mongodb_data:
  frontend_build:

networks:
  audionix_network:
    driver: bridge