services:
  mongodb:
    image: mongo:7
    container_name: audionix_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: Audionix_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - audionix_network

  backend:
    build: ./backend
    container_name: audionix_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGODB_URL: mongodb://admin:password123@mongodb:27017/Audionix_db?authSource=admin
      SECRET_KEY: your-production-secret-key-here
      CORS_ORIGINS: https://audionix.djgrego.com,http://localhost,http://127.0.0.1,http://localhost:8081
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - audionix_network

  frontend:
    build: ./frontend
    container_name: audionix_frontend
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - backend
    networks:
      - audionix_network

volumes:
  mongodb_data:

networks:
  audionix_network:
    driver: bridge